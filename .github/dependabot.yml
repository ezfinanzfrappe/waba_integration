version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule: { interval: "weekly", day: "sunday", time: "04:00", timezone: "Asia/Kolkata" }
    open-pull-requests-limit: 5
    labels: ["pls-review", "dependencies"]
    commit-message:
      prefix: "deps"
      include: "scope"
  - package-ecosystem: "pip"
    directory: "/"
    schedule: { interval: "weekly", day: "sunday" }
    open-pull-requests-limit: 5
    labels: ["pls-review", "dependencies"]
    commit-message: { prefix: "deps", include: "scope" }
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "monthly" }
    labels: ["pls-review", "dependencies"]
    commit-message: { prefix: "ci", include: "scope" }